name: Build image manifest

on:
  push:
    paths:
      - 'images/**'
      - 'scripts/build-manifest.js'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate images.json
        run: node scripts/build-manifest.js

      - name: Commit manifest if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images.json
          git diff --staged --quiet || git commit -m "Update image manifest"
          git push
